name: "MLOps Lifecycle"
filename: "mlops_lifecycle"
# LR matches AWS Figure 3 horizontal layout; avoids column-split artifacts
# from the feedback edge that occur in TB mode.
direction: "LR"

# Graphviz layout tuning — tighter padding so the image fits the site embed
# without excessive blank space around the diagram content.
graph_attr:
  pad: "0.35"
  ranksep: "0.55"
  nodesep: "0.4"

# Slightly larger node labels than the library default (13pt) for readability.
node_attr:
  fontsize: "14"

clusters:
  - name: "Business Goal"
    nodes:
      - id: business_goal
        label: "Define\nBusiness Goal"
        type: "programming.flowchart.Action"
      - id: ml_problem
        label: "Define\nML Problem"
        type: "programming.flowchart.Action"

  - name: "Data Processing"
    nodes:
      - id: collect_data
        label: "Collect\nData"
        type: "programming.flowchart.Database"
      - id: preprocess
        label: "Pre-process Data &\nEngineer Features"
        type: "programming.flowchart.Action"

  - name: "Model Development"
    nodes:
      - id: training
        label: "Model Training\n& Tuning"
        type: "programming.flowchart.Action"
      - id: evaluation
        label: "Model\nEvaluation"
        type: "programming.flowchart.Inspection"

  - name: "Deployment & Monitoring"
    nodes:
      - id: deployment
        label: "Model\nDeployment"
        type: "programming.flowchart.Action"
      - id: monitoring
        label: "Model\nMonitoring"
        type: "programming.flowchart.Inspection"

nodes:
  - id: start
    label: "Start"
    type: "programming.flowchart.StartEnd"

connections:
  - from: start
    to: business_goal
  - from: business_goal
    to: ml_problem
  - from: ml_problem
    to: collect_data
  - from: collect_data
    to: preprocess
  - from: preprocess
    to: training
  - from: training
    to: evaluation
  - from: evaluation
    to: deployment
  - from: deployment
    to: monitoring
  - from: monitoring
    to: collect_data
    label: "retrain /\ndrift detected"
