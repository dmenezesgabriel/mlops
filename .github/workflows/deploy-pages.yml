name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --dev --frozen --extra transformers --extra evaluation

      - name: Lint
        run: make lint

      - name: Type check
        run: make type-check

      - name: Test
        run: make test

      - name: Dependency checks
        run: make dependencies

      - name: Architecture checks
        run: make architecture

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build diagrams image
        uses: docker/build-push-action@v7
        with:
          context: libs/diagrams
          file: libs/diagrams/Dockerfile
          tags: mlops-diagrams-prod
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render diagrams
        run: make diagrams-render

      - name: Build configured site
        run: make build-site

      - name: Prepare Pages artifact
        run: touch site/build/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
