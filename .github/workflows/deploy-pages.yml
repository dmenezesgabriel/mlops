name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  render-videos:
    name: Render Video (${{ matrix.scene.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        scene:
          - path: videos/src/mlops_videos/concepts/bias_variance_tradeoff.py
            name: BiasVarianceTradeoffScene
          - path: videos/src/mlops_videos/concepts/crisp_dm.py
            name: CrispDmScene
          - path: videos/src/mlops_videos/concepts/mlops_lifecycle.py
            name: MlopsLifecycleScene
          - path: videos/src/mlops_videos/concepts/underfit_vs_overfit.py
            name: UnderfitVsOverfitScene
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Render video
        run: make render-video SCENE=${{ matrix.scene.path }} SCENE_NAME=${{ matrix.scene.name }}

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ matrix.scene.name }}
          path: videos/output/*.mp4
          if-no-files-found: error

  integration-test:
    name: Visual Regression Test
    runs-on: ubuntu-latest
    needs: render-videos
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Docker visual regression tests
        run: |
          cd videos && uv run pytest tests/integration/ -m docker -v

  build:
    name: Build Pages Artifact
    runs-on: ubuntu-latest
    needs: [render-videos, integration-test]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --dev --frozen

      - name: Download rendered videos
        uses: actions/download-artifact@v4
        with:
          pattern: video-*
          path: videos/output/
          merge-multiple: true

      - name: Lint
        run: make lint

      - name: Type check
        run: make type-check

      - name: Test
        run: make test

      - name: Dependency checks
        run: make dependencies

      - name: Architecture checks
        run: make architecture

      - name: Build configured site
        run: make build-site

      - name: Prepare Pages artifact
        run: touch site/build/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
