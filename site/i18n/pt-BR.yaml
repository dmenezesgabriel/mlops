  A field report for reproducible machine-learning systems.: Um relato de campo para sistemas de machine learning reprodutiveis.
  Generated by the content-first static site generator.: Gerado pelo gerador de sites estaticos orientado a conteudo.
  This project turns NYC TLC yellow taxi trip records into local, reproducible demand forecasting pipelines.: Este projeto transforma registros de viagens de taxis amarelos da NYC TLC em pipelines locais e reprodutiveis de previsao de demanda.
  Start with [[{88800}|Problem Framing]], then follow [[{88801}|Data Collection]] and [[{88802}|Exploratory Data Analysis]].: Comece por [[{88800}|Formulacao do Problema]], depois siga [[{88801}|Coleta de Dados]] e [[{88802}|Analise Exploratoria de Dados]].
  Predict next-hour pickup demand per NYC taxi zone from recent yellow taxi pickups. The first local workflow optimizes for reproducibility and fast iteration before production orchestration.: Preveja a demanda de embarques da proxima hora por zona de taxi de NYC a partir de embarques recentes de taxis amarelos. O primeiro fluxo local otimiza reprodutibilidade e iteracao rapida antes da orquestracao em producao.
  The collector stores immutable monthly TLC parquet files under {99900} and skips files already present locally.: O coletor armazena arquivos parquet mensais imutaveis da TLC em {99900} e ignora arquivos que ja existem localmente.
  Trip records are cleaned, grouped by pickup zone and hour, and shifted to create {99900} as the supervised target.: Os registros de viagens sao limpos, agrupados por zona de embarque e hora, e deslocados para criar {99900} como alvo supervisionado.
  Feast owns local feature definitions while DuckDB provides the offline store for reproducible development.: O Feast gerencia as definicoes locais de features, enquanto o DuckDB fornece o armazenamento offline para desenvolvimento reprodutivel.
  Hourly pickup demand features are intentionally small for the first reproducible pipeline.: As features horarias de demanda de embarques sao intencionalmente pequenas para o primeiro pipeline reprodutivel.
  Training writes metrics and model artifacts to a local SQLite-backed MLflow tracking store. This is suitable for development and education, not production registry operations.: O treinamento grava metricas e artefatos de modelo em um tracking store local do MLflow com SQLite. Isso e adequado para desenvolvimento e educacao, nao para operacoes de registro em producao.
  Model Training & Algorithm Selection: Treinamento de Modelos & Selecao de Algoritmos
